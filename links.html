  <!-- Load blog.js to get latest post -->
  <script src="/js/blog.js"></script>

  <!-- Update latest blog link dynamically -->
  <script>
    (function() {
      if (typeof BLOG_POSTS !== 'undefined' && BLOG_POSTS.length > 0) {
        var latestPost = BLOG_POSTS[0];
        var blogLink = document.getElementById('latest-blog-link');
        if (blogLink && latestPost) {
          blogLink.href = '/blog/post.html?post=' + latestPost.slug;
          blogLink.textContent = latestPost.title;
        }
      }
    })();
  </script>

  <!-- GA4 Event Tracking for Link Clicks -->
  <script>
    document.querySelectorAll('[data-track-cta]').forEach(function(link) {
      link.addEventListener('click', function() {
        var ctaName = this.getAttribute('data-track-cta');
        if (typeof gtag === 'function') {
          gtag('event', 'cta_click', {
            'cta_name': ctaName,
            'page_location': window.location.href
          });
        }
      });
    });
  </script>
